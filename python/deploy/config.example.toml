# iris (Reflex) — room-tuned brightness curve.
# Calibrated live on-device 2026-07-04 (cloudy daytime).
# PHYSICAL MODEL: one straight log-lux line, clamped to caps at both ends.
#   - TOP fixed at 100% = direct sun (~70k lx) — the physically-motivated ceil.
#   - FLOOR-CROSSING (the tuned knob): 3% at ~25 lx, placing normal indoor light.
# Gentle slope 0.28/decade => dim-leaning: 100 lx -> 20%, 200 lx -> 28%, topping
# out ~50-77% at a bright indoor window; only real sun on the sensor pegs 100%.
#   <25 lx -> 3% | 100 lx -> 20% | 200 lx -> 28% | 1000 lx -> 49% | 10000 lx -> 76%
# PROVISIONAL: retune the floor / low end tonight in real darkness. To reach
# 100% sooner, lower the 70000 anchor; to shift the mid dimmer, raise the 25 lx.

[curve]
floor = 0.03
ceil = 1.0
eps = 0.5
anchors = [[25.0, 0.03], [70000.0, 1.0]]
